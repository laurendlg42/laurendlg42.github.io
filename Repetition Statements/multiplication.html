<!DOCTYPE html>
<html>
    <head>
        <script>
            function product()
            {
                var multiplicand = document.getElementById("multiplicand").value;
                var multiplier = document.getElementById("multiplier").value;

                for( var x = 1; x <multiplier; x++)
            {
                document.getElementById("math-output").innerHTML += multiplicand + " X " + x + " = " + ( multiplicand * x);
            }
            }    
        </script>
    </head>
    <body>
        <form name="multiply">
            <label for=""multiplied>multiplicated: </label><br>
            <input type="number" name="multiplicated" id="multiplicated" value=""><br>
            <label for=""multiplied>multiplier: </label><br>
            <input type="number" name="multiplier" id="multiplier" value=""><br>

            <input type="button" value="Click here for times table" onclick="product()">

            <div id="math-output"></div>
        </form>
    </body>
</html>
