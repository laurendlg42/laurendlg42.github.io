<!DOCTYPE html>
<html>
    <head>
         
    </head>

    <body>
        <h2>Tax Calculator</h2>
    
        <label>Purchase Amount:</label>
        <input type="number" id="purchaseAmount" step="0.01"><br>

        <button onclick="calculate()">Calculate</button><br>

        <label>Tax Amount (8.25%):</label>
        <input type="text" id="taxDisplay" disabled><br>

        <label>Total:</label>
        <input type="text" id="totalDisplay" disabled>
    

        <script>
             function calculate() {
       
             var amount = parseFloat(document.getElementById('purchaseAmount').value);
             var taxRate = 0.0825;

             if (isNaN(amount)) {
             alert("Please enter a number");
             return;
             }

             var taxAmount = amount * taxRate;
             var totalAmount = amount + taxAmount;

        
             document.getElementById('taxDisplay').value = "$" + taxAmount.toFixed(2);
             document.getElementById('totalDisplay').value = "$" + totalAmount.toFixed(2);
             }
        </script>
    </body>
</html>
